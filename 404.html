<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Redirecting…</title>
<style>
  body { font-family: system-ui, sans-serif; background: #f1f5f9; color: #334155;
         display: flex; min-height: 100vh; align-items: center; justify-content: center;
         margin: 0; text-align: center; }
  .spin { width: 34px; height: 34px; border: 3px solid #cbd5e1; border-top-color: #0d9488;
          border-radius: 50%; animation: r .8s linear infinite; }
  @keyframes r { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="spin"></div>
<script>
  // URL /exec ของ GAS web app
  var GAS = 'https://script.google.com/macros/s/AKfycbyWwsn83rFAaax2Sc6WutKCUeyLnhvDfwDyC7MHJ9K9Z2NOUIpz_Oca8rVRAexzMsZz_A/exec';

  var parts = location.pathname.split('/').filter(Boolean);
  var code  = parts.length ? parts[parts.length - 1] : '';

  // navigate ทั้งหน้าไป GAS ให้มันจัดการ redirect เอง (ไม่ใช่ fetch จึงไม่ติด CORS)
  if (code) { window.location.replace(GAS + '?c=' + encodeURIComponent(code)); }
  else      { window.location.replace(GAS); }
</script>
</body>
</html>
