<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Redirecting…</title>
<style>
  body { font-family: system-ui, sans-serif; background: #f1f5f9; color: #334155;
         display: flex; min-height: 100vh; align-items: center; justify-content: center;
         margin: 0; text-align: center; }
  .box { padding: 24px; }
  .spin { width: 34px; height: 34px; border: 3px solid #cbd5e1; border-top-color: #0d9488;
          border-radius: 50%; animation: r .8s linear infinite; margin: 0 auto 14px; }
  @keyframes r { to { transform: rotate(360deg); } }
  a { color: #0d9488; word-break: break-all; }
</style>
</head>
<body>
<div class="box" id="box">
  <div class="spin"></div>
  <div id="msg">กำลังพาไป…</div>
</div>
<script>
  // 🔧 วาง URL /exec ของ GAS ที่ deploy ไว้ตรงนี้
  var API = 'https://script.google.com/macros/s/AKfycbyWwsn83rFAaax2Sc6WutKCUeyLnhvDfwDyC7MHJ9K9Z2NOUIpz_Oca8rVRAexzMsZz_A/exec';

  (function () {
    var parts = location.pathname.split('/').filter(Boolean);
    var code  = parts.length ? parts[parts.length - 1] : '';
    var base  = parts.length > 1 ? '/' + parts[0] + '/' : '/';

    function fail(html) { document.getElementById('box').innerHTML = html; }
    if (!code) { fail('<h2>ไม่พบรหัสลิงก์</h2>'); return; }

    fetch(API + '?c=' + encodeURIComponent(code))
      .then(function (r) { return r.json(); })
      .then(function (d) {
        if (d.ok && d.url) { location.replace(d.url); }
        else { fail('<h2>ไม่พบลิงก์</h2><p>รหัส: <b>' + code + '</b></p>' +
                    '<p><a href="' + base + '">ดูลิงก์ทั้งหมด</a></p>'); }
      })
      .catch(function () { fail('<h2>เชื่อมต่อฐานข้อมูลไม่สำเร็จ</h2>'); });
  })();
</script>
</body>
</html>
