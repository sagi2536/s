<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Redirecting…</title>
<style>
  body { font-family: system-ui, sans-serif; background: #f1f5f9; color: #334155;
         display: flex; min-height: 100vh; align-items: center; justify-content: center;
         margin: 0; text-align: center; }
  .box { padding: 24px; }
  .spin { width: 34px; height: 34px; border: 3px solid #cbd5e1; border-top-color: #0d9488;
          border-radius: 50%; animation: r .8s linear infinite; margin: 0 auto 14px; }
  @keyframes r { to { transform: rotate(360deg); } }
  a { color: #0d9488; word-break: break-all; }
</style>
</head>
<body>
<div class="box" id="box"><div class="spin"></div><div id="msg">กำลังพาไป…</div></div>
<script>
  var CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTsYRO4nUqWAkHD5cDwWcLPhY_Bb5d__y_F3iULO6SPz3hcrnHnCxbYTQwFpKKAFNyD_bRZIAEc-kTS/pub?gid=0&single=true&output=csv';

  function parseCSV(text) {
    // parser ง่าย ๆ รองรับค่าที่มี "..." คร่อม และ comma ในค่า
    var rows = [], row = [], cur = '', q = false;
    for (var i = 0; i < text.length; i++) {
      var ch = text[i];
      if (q) {
        if (ch === '"') { if (text[i+1] === '"') { cur += '"'; i++; } else q = false; }
        else cur += ch;
      } else {
        if (ch === '"') q = true;
        else if (ch === ',') { row.push(cur); cur = ''; }
        else if (ch === '\n') { row.push(cur); rows.push(row); row = []; cur = ''; }
        else if (ch === '\r') { /* skip */ }
        else cur += ch;
      }
    }
    if (cur !== '' || row.length) { row.push(cur); rows.push(row); }
    return rows;
  }

  var parts = location.pathname.split('/').filter(Boolean);
  var code  = parts.length ? parts[parts.length - 1] : '';
  var base  = parts.length > 1 ? '/' + parts[0] + '/' : '/';
  function fail(html) { document.getElementById('box').innerHTML = html; }

  if (!code) { fail('<h2>ไม่พบรหัสลิงก์</h2>'); }
  else {
    fetch(CSV + '&_=' + Date.now())
      .then(function (r) { return r.text(); })
      .then(function (text) {
        var rows = parseCSV(text);
        var header = rows[0].map(function (h) { return String(h).trim(); });
        var ci = header.indexOf('code'), ui = header.indexOf('url');
        var url = '';
        for (var i = 1; i < rows.length; i++) {
          if (rows[i][ci] && String(rows[i][ci]).trim() === code) { url = String(rows[i][ui]).trim(); break; }
        }
        if (url) { location.replace(url); }
        else { fail('<h2>ไม่พบลิงก์</h2><p>รหัส: <b>' + code + '</b></p><p><a href="' + base + '">ดูลิงก์ทั้งหมด</a></p>'); }
      })
      .catch(function () { fail('<h2>โหลดข้อมูลไม่สำเร็จ</h2>'); });
  }
</script>
</body>
</html>
